<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            
            .banner{

                /*background-color: bisque;*/
                width: 100%;
                height: 100vh;

                background: linear-gradient(115deg, rgb(147, 194, 228)50%,transparent 50% ),
                url("./images/04.jpg") right center /auto 100%;
                
            }

            .container{
                width: 1200px;
                margin: auto;
                height: 100%;
            }
            .banner-txt{
                height: 100%;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: flex-start;
            }

            
            h1{
                font-size: 80px;
                border-bottom: 1px solid #333;
                padding-bottom: 10px;
                margin-bottom: 10px;

            }
            h1 small{
                display: block;
                font-size: 40px;
            }

            .banner-txt h2{
                font-size: 45px;
                margin-bottom: 10px;
            }

            .banner-txt p{
                font-size: 20px;
                line-height: 1.5;
            }      
        
        }
    </style>
</head>
<body>
    <div class="banner">
        <div class="container">
            <div class="banner-txt">
                <h1>主標題
                    <small>主標題內容</small>
                </h1>
                <h2>副標題</h2>
                <p>Lorem, ipsum dolor sit amet consectetur adipisicing elit. Aut, magnam.</p>
                <p>Lorem ipsum dolor sit amet consectetur.</p>
                <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit.</p>
               
            </div>
        </div>
    </div>
    
</body>
</html>
