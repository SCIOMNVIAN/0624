<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<style>
    *{
        margin: 0;
        padding: 0;
        font-family: Arial, Helvetica, sans-serif;
    }

    .wrap{
        width: 1200px;
        display:flex ;
        flex-wrap: wrap;
        margin: 50px auto;
    }

    .item{
        width: 49%;
        height: 400px;
        margin-right: 5px;
        margin-bottom: 5px;
        position: relative;
    }

    .item img{
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .item .txt{
        background-color: rgba(0,0,0,0.5);
        color: #fff;

        position: absolute;
        top: 0;
        bottom: 0;
        left: 0;
        right: 0;

        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;

        opacity: 0;
    }

    .item:hover .txt{
        opacity: 1;
    }

    .item .txt h2{
        color: #f2ffac;
    }

    .item .txt h2::after{
        content: '';
        display: block;
        width: 0%;
        height: 3px;
        background-color: #f2ffac;
        margin: 10px 0;
        transition: all .5s;
    }

   

    .item:hover .txt h2::after{
        width: 100%;
    }



</style>

<body>
    
    <div class="wrap">
        <div class="item">
            <img src="./images/08.jpg" alt="">
            <div class="txt">
                <h2>互動圖文卡片1</h2>

            </div>
        </div>
